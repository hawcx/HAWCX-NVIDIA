# Example sandbox policy wiring the ext-authz middleware onto an endpoint rule.
#
# Shape follows the `middleware_configs` block proposed in NVIDIA/OpenShell#1694
# (top-level `middleware_configs` map + a per-endpoint `middleware` list), extended
# with the v1 egress-hook fields #1733 calls for: stage, enforcement mode, and
# fail-closed behavior. This is illustrative — the canonical schema lands with
# rfc/0005-sandbox-egress-middleware.

version: 1

middleware_configs:
  # An external per-action authorizer (Hawcx HAAP verifier, or any guard service
  # speaking the /v1/authorize contract in ext-authz-core::types).
  haap_authz:
    middleware: ext-authz
    # v1 egress hook stage. Authorizers run pre-credential and never see the secret.
    stage: pre-credential
    # Out-of-process verifier. Prefer a loopback unix socket or mTLS in production.
    verifier_url: http://127.0.0.1:18443/v1/authorize
    mode: enforce              # enforce | observe
    fail: closed               # closed | open   (closed = deny if the verifier can't run)
    timeout_ms: 100            # inline hot-path budget; sub-ms is typical
    token_header: x-hawcx-haap-token
    forward_headers: [x-request-id]
    strip_token_header: true   # the per-action token is for the verifier, not the upstream API
    max_body_bytes: 1048576

  # (For contrast) a post-credential transform, the #1694/#1638 sigv4 case. It needs
  # the resolved credential, so it runs in the post-credential stage and is first-party.
  sigv4_bedrock:
    middleware: sigv4
    stage: post-credential
    signing_service: bedrock

network_policies:
  github_api:
    name: github-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        # Ordered: content mutators (none here) run before the authorizer; the
        # authorizer is the last pre-credential step. `required: true` makes the
        # authorizer fail-closed for this destination specifically.
        middleware:
          - { ref: haap_authz, required: true }

  bedrock:
    name: bedrock-runtime
    endpoints:
      - host: bedrock-runtime.us-east-1.amazonaws.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        middleware:
          - { ref: haap_authz, required: true }   # authorize the action (pre-credential)
          - { ref: sigv4_bedrock }                 # then sign with the credential (post-credential)
